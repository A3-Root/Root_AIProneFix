name = "Roots AI Prone Fix"
author = "Root"
prefix = "root_aipronefix"
mainprefix = "z"
folder_optionals = true

[files]
include = [
    "mod.cpp",
    "meta.cpp",
    "LICENSE",
    "root_aipronefix_logo.paa",
    "README*.md",
]
exclude = [
    ".gitignore",
    ".editorconfig",
    "*.md",
    "*.json",
]

[properties]
author = "Root"
url = "https://github.com/A3-Root/Root_AIProneFix"

[lints.sqf.banned_commands]
options.banned = [
    "execVM",
]
options.ignore = [
    "addPublicVariableEventHandler",
]

[config.config_this_call]
enabled = true

[sqf.undefined]
enabled = true
options.check_orphan_code = true

[sqf.if_not_else]
enabled = true

[sqf.shadowed]
enabled = true

[sqf.not_private]
enabled = true

[sqf.short_circuit_bool_var]
enabled = true

[version]
git_hash = 0
